# Mixed combat train config (Agent-0: G1, Agent-1: PM01)
task: HumanoidCombatMixedZ
num_envs: 1024
env_spacing: 5
episode_length: 900
enable_debug_vis: False
kp_scale: 1

control_mode: "pd"
power_reward: False
z_size: 64

self_obs_v: 1
obs_v: 6

z_readout: False
fitting: False

distill: false
save_kin_info: False
z_read: False

power_scale: 1.0
controlFrequencyInv: 4

local_root_obs: True
root_height_obs: True
key_bodies: ["left_ankle_roll_link", "right_ankle_roll_link", "left_wrist_yaw_link", "right_wrist_yaw_link"]
contact_bodies: ["left_ankle_pitch_link", "left_ankle_roll_link", "right_ankle_pitch_link", "right_ankle_roll_link", "right_knee_link", "left_knee_link"]
terminationHeight: 0.20
enableEarlyTermination: True
enableTaskObs: True

too_close_dist: 0.3
too_close_frames: 150
hand_target_close_dist: 0.6
hand_target_close_frames: 50

agent_spawn_positions:
  - [0.4, 0.1]
  - [-0.4, -0.1]
agent_spawn_headings:
  - 3.1415926
  - 0.0
spawn_height: 0.89
odd_agent_head_body_index: 24
too_far_dist: 2.5 # 1.2
contact_force_threshold: 50.0
reward_weights:
  reward_f: 0.0
  reward_v: 0.0
  reward_s: 0.01
  reward_t: 100.0
  reward_h: 0.0
  hit_dist_thresh: 0.3
ring_pose_z: -1.02
ring_color: [1.0, 1.0, 1.0]
ring_asset:
  asset_root: "phc/data/assets/urdf/"
  asset_file: "combat_ring.urdf"
  angular_damping: 0.01
  linear_damping: 0.01
  max_angular_velocity: 100.0
  density: 1.0

agent_robot_cfgs:
  - "phc/data/cfg/robot/g1_29dof.yaml"
  - "phc/data/cfg/robot/pm01_24dof.yaml"
agent_contact_bodies:
  - ["left_ankle_pitch_link", "left_ankle_roll_link", "right_ankle_pitch_link", "right_ankle_roll_link", "right_knee_link", "left_knee_link"]
  - ["link_ankle_pitch_l", "link_ankle_roll_l", "link_ankle_pitch_r", "link_ankle_roll_r", "link_knee_pitch_r", "link_knee_pitch_l"]

g1_prior_path: "output/HumanoidIm/g1_combat_prior/Humanoid_00007000.pth"
pm01_prior_path: "output/HumanoidIm/pm01_combat_prior/Humanoid.pth"
prior_activation: "silu"

plane:
  staticFriction: 1.0
  dynamicFriction: 1.0
  restitution: 0.0
