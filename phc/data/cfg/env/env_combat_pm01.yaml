# PM01 robot combat task config
task: HumanoidCombatPM01Z
num_envs: 1024
env_spacing: 5
episode_length: 900
enable_debug_vis: False
kp_scale: 1

control_mode: "pd"
power_reward: False
z_size: 64

self_obs_v: 1
obs_v: 6

z_readout: False
fitting: False

distill: false
save_kin_info: False
z_read: False
# Override: path to PM01 PULSE im_distill checkpoint
models: ['output/HumanoidIm/pm01_combat_prior/Humanoid.pth']

power_scale: 1.0
controlFrequencyInv: 4

local_root_obs: True
root_height_obs: True
# PM01 key/contact bodies
key_bodies: ["link_ankle_roll_l", "link_ankle_roll_r", "link_elbow_yaw_l", "link_elbow_yaw_r"]
contact_bodies: ["link_ankle_pitch_l", "link_ankle_roll_l", "link_ankle_pitch_r", "link_ankle_roll_r", "link_knee_pitch_r", "link_knee_pitch_l"]
terminationHeight: 0.15
enableEarlyTermination: True
enableTaskObs: True

# Combat-specific
too_close_dist: 0.3
too_close_frames: 100 # 60
hand_target_close_dist: 0.6
hand_target_close_frames: 50 # 30
agent_spawn_positions:
  - [0.4, 0.1]
  - [-0.4, -0.1]
agent_spawn_headings:
  - 3.1415926
  - 0.0
spawn_inside_margin: [1.0, 1.0]
combat_area: [-2.5, 2.5, -2.5, 2.5]
too_far_dist: 2.5 # 1.2
chest_body_index: 11
contact_force_threshold: 50.0
contact_force_clip_min: 100.0
contact_force_clip_max: 3000.0
reward_weights:
  reward_f: 0.0
  reward_v: 0.0
  reward_s: 0.01
  reward_t: 100.0
  reward_h: 0.0
  hit_dist_thresh: 0.3
ring_pose_z: -1.02
ring_color: [1.0, 1.0, 1.0]
ring_asset:
  asset_root: "phc/data/assets/urdf/"
  asset_file: "combat_ring.urdf"
  angular_damping: 0.01
  linear_damping: 0.01
  max_angular_velocity: 100.0
  density: 1.0

plane:
  staticFriction: 1.0
  dynamicFriction: 1.0
  restitution: 0.0
